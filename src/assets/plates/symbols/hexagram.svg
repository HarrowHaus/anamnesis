<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-label="Hexagram — two interlaced triangles">
  <rect width="1000" height="1000" fill="#e9e4d6"/>
  <g fill="none" stroke="#1a1612" stroke-width="7" stroke-linejoin="round">
    <!-- upward triangle -->
    <polygon points="500,170 786,665 214,665"/>
    <!-- downward triangle -->
    <polygon points="500,830 214,335 786,335"/>
    <!-- circumscribing circle -->
    <circle cx="500" cy="500" r="392" stroke-width="4" opacity="0.5"/>
  </g>
</svg>
