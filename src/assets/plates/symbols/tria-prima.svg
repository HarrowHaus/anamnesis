<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-label="The Tria Prima — the alchemical glyphs of sulphur, mercury and salt">
  <rect width="1000" height="1000" fill="#e9e4d6"/>
  <g fill="none" stroke="#1a1612" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <!-- binding triangle -->
    <polygon points="500,250 720,650 280,650" stroke-width="3" opacity="0.4"/>
    <!-- Sulphur (top): triangle over cross -->
    <polygon points="500,250 448,344 552,344"/>
    <line x1="500" y1="344" x2="500" y2="430"/>
    <line x1="460" y1="388" x2="540" y2="388"/>
    <!-- Mercury (lower left): horns, circle, cross -->
    <path d="M306 566 a34 34 0 0 1 68 0"/>
    <circle cx="340" cy="648" r="42"/>
    <line x1="340" y1="690" x2="340" y2="772"/>
    <line x1="304" y1="732" x2="376" y2="732"/>
    <!-- Salt (lower right): circle bisected -->
    <circle cx="660" cy="650" r="54"/>
    <line x1="606" y1="650" x2="714" y2="650"/>
  </g>
</svg>
