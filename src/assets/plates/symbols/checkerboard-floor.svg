<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-label="Checkerboard floor — the mosaic pavement">
  <rect width="1000" height="1000" fill="#e9e4d6"/>
  <defs>
    <pattern id="check" width="220" height="220" patternUnits="userSpaceOnUse">
      <rect width="110" height="110" fill="#1a1612"/>
      <rect x="110" y="110" width="110" height="110" fill="#1a1612"/>
    </pattern>
  </defs>
  <rect x="120" y="120" width="660" height="660" fill="url(#check)"/>
  <rect x="120" y="120" width="660" height="660" fill="none" stroke="#1a1612" stroke-width="10"/>
  <rect x="96" y="96" width="708" height="708" fill="none" stroke="#1a1612" stroke-width="5"/>
</svg>
